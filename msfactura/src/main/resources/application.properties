spring.application.name=msfactura
server.port=8084
spring.datasource.url=jdbc:h2:mem:facturadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=true
# Ya que no se utiliza Flyway esta propiedad debe estar en "create" o "update"
# de lo contrario no se creara la base de datos
